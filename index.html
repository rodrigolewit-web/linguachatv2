<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toc Tu Mi — Conversación por voz</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0e0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Toc Tu Mi">
<link rel="apple-touch-icon" href="/icon.svg">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0f14;
    --surface: #16181f;
    --surface2: #1e2028;
    --border: #2a2d38;
    --accent-en: #4f9cf9;
    --accent-fr: #c084fc;
    --accent-pt: #34d399;
    --accent: #4f9cf9;
    --text: #e8eaf0;
    --muted: #6b7280;
  }

  body {
    font-family: 'Inter', sans-serif;
    background: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1920&q=80') center/cover no-repeat fixed;
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ══ LOGIN ══ */
  #login-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    align-items: center;
  }
  .login-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.8rem;
    background: linear-gradient(135deg, var(--accent-en) 0%, var(--accent-fr) 50%, var(--accent-pt) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .login-card input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .login-card input:focus { outline: none; border-color: var(--accent-fr); }
  .login-card button {
    width: 100%;
    padding: 0.9rem;
    border-radius: 10px;
    border: none;
    background: var(--accent-fr);
    color: #0e0f14;
    font-family: 'Inter', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .login-card button:hover { filter: brightness(1.1); }
  .login-error {
    font-size: 0.78rem;
    color: #fca5a5;
    display: none;
  }

  /* ══ PLAYER SELECT ══ */
  #player-screen {
    flex: 1;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    padding: 2rem;
  }
  .player-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
    width: 100%;
    max-width: 360px;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    align-items: center;
  }
  .player-card h2 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--text);
  }
  .player-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.8rem;
    width: 100%;
  }
  .player-btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1.2rem 0.5rem;
    cursor: pointer;
    text-align: center;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    transition: all 0.15s;
    position: relative;
  }
  .player-btn:hover { border-color: var(--accent-fr); background: rgba(192,132,252,0.1); color: var(--accent-fr); }
  .avatar-wrapper {
    position: relative;
    display: inline-block;
    margin-bottom: 0.3rem;
    cursor: pointer;
  }
  .avatar-wrapper:hover .avatar-edit-hint { opacity: 1; }
  .avatar-edit-hint {
    position: absolute; bottom: -4px; right: -6px;
    background: var(--accent-fr); color: #0e0f14;
    font-size: 0.55rem; border-radius: 50%;
    width: 16px; height: 16px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0.85; transition: opacity 0.15s; pointer-events: none;
  }
  .player-btn .player-dot {
    display: block;
    font-size: 1.8rem;
  }
  .player-btn .player-badge {
    position: absolute;
    top: 6px; right: 6px;
    background: var(--accent-pt);
    color: #0e0f14;
    font-size: 0.55rem;
    font-weight: 700;
    padding: 1px 5px;
    border-radius: 10px;
    display: none;
  }
  .player-btn.has-history .player-badge { display: block; }
  .player-stats { display: block; font-size: 0.65rem; color: var(--muted); margin-top: 4px; line-height: 1.4; }
  .player-edit-btn {
    position: absolute; bottom: 5px; right: 6px;
    font-size: 0.65rem; background: none; border: none;
    color: var(--muted); cursor: pointer; padding: 0; line-height: 1;
    opacity: 0.6; transition: opacity 0.15s;
  }
  .player-edit-btn:hover { opacity: 1; }

  /* ══ CONFIG SCREEN ══ */
  .config-open-btn {
    margin-top: 1rem; width: 100%; padding: 10px;
    background: none; border: 1px solid var(--border); border-radius: 10px;
    color: var(--muted); font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
  }
  .config-open-btn:hover { border-color: var(--accent-fr); color: var(--accent-fr); }
  #config-screen {
    display: none; position: fixed; inset: 0; z-index: 90;
    background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
  }
  .config-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 1.25rem; width: 90%; max-width: 360px;
    display: flex; flex-direction: column; gap: 1rem;
  }
  .config-subtitle { font-size: 0.8rem; color: var(--muted); text-align: center; }
  .config-player-row {
    display: flex; gap: 10px; justify-content: center;
  }
  .cfg-player-btn {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    background: var(--surface2); border: 2px solid var(--border);
    border-radius: 14px; padding: 10px 14px; cursor: pointer;
    font-size: 0.85rem; font-weight: 600; color: var(--muted);
    transition: all 0.2s; min-width: 70px;
  }
  .cfg-player-btn .cfg-avatar { font-size: 2rem; line-height: 1; }
  .cfg-player-btn.active { border-color: var(--accent-fr); color: var(--accent-fr); background: rgba(192,132,252,0.1); }
  .config-actions {
    display: flex; flex-direction: column; gap: 10px;
  }
  .cfg-action-btn {
    width: 100%; padding: 12px; border-radius: 12px; font-size: 0.9rem;
    font-weight: 600; cursor: pointer; border: none; transition: all 0.15s;
  }
  .cfg-action-btn.primary { background: var(--accent-fr); color: #0e0f14; }
  .cfg-action-btn.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .cfg-action-btn:disabled { opacity: 0.35; cursor: default; }

  /* ══ AVATAR PICKER ══ */
  #avatar-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.7); z-index: 999;
    align-items: center; justify-content: center;
  }
  #avatar-modal.open { display: flex; }
  .avatar-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 1.25rem; max-width: 320px; width: 90%;
    text-align: center;
  }
  .avatar-card h3 { margin-bottom: 1rem; font-size: 1rem; color: var(--text); }
  .avatar-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px;
    margin-bottom: 1rem;
  }
  .avatar-opt {
    font-size: 1.6rem; cursor: pointer; border-radius: 8px;
    padding: 4px; border: 2px solid transparent;
    transition: border-color 0.15s, background 0.15s;
    background: none;
  }
  .avatar-opt:hover { background: var(--surface2); }
  .avatar-opt.selected { border-color: var(--accent-fr); }
  .avatar-close {
    font-size: 0.85rem; color: var(--muted); cursor: pointer;
    background: none; border: none; padding: 4px 12px;
  }
  .acat-tabs {
    display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 0.75rem; justify-content: center;
  }
  .acat-tab {
    font-size: 0.72rem; padding: 4px 10px; border-radius: 20px; cursor: pointer;
    border: 1px solid var(--border); background: none; color: var(--muted); transition: all 0.15s;
  }
  .acat-tab.active { background: var(--accent-fr); color: #0e0f14; border-color: var(--accent-fr); font-weight: 600; }
  .avatar-grids { max-height: 220px; overflow-y: auto; }
  .avatar-cat-grid { display: none; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .avatar-cat-grid.active { display: grid; }

  /* ══ HISTORY ══ */
  #history-screen {
    display: none; flex-direction: column; flex: 1;
    padding: 1rem; overflow-y: auto; gap: 1rem;
  }
  .history-header {
    display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.25rem;
  }
  .history-back {
    background: none; border: 1px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 0.85rem;
  }
  .history-title { font-size: 1.1rem; font-weight: 600; }
  .history-tabs {
    display: flex; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 0;
  }
  .htab {
    padding: 8px 16px; font-size: 0.85rem; font-weight: 500; cursor: pointer;
    border: none; background: none; color: var(--muted); border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: all 0.15s;
  }
  .htab.active { color: var(--accent-fr); border-bottom-color: var(--accent-fr); }
  .htab-content { display: none; flex-direction: column; gap: 0.85rem; padding-top: 0.5rem; }
  .htab-content.active { display: flex; }
  .h-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 1rem;
  }
  .h-card-title {
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem;
  }
  .h-summary { font-size: 0.9rem; line-height: 1.6; color: var(--text); }
  .h-item { padding: 0.6rem 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; line-height: 1.5; }
  .h-item:last-child { border-bottom: none; padding-bottom: 0; }
  .h-mistake { color: #f87171; font-weight: 600; }
  .h-correction { color: #4ade80; font-weight: 600; }
  .h-expl { color: var(--muted); font-size: 0.8rem; margin-top: 2px; }
  .h-word { color: var(--accent-en); font-weight: 600; }
  .h-meaning { color: var(--muted); font-size: 0.8rem; }
  .h-phrase { color: var(--accent-fr); font-weight: 500; }
  .h-pill {
    display: inline-block; padding: 4px 10px; border-radius: 20px;
    font-size: 0.78rem; margin: 3px 3px 0 0;
  }
  .h-pill.good { background: rgba(74,222,128,0.12); color: #4ade80; }
  .h-pill.bad  { background: rgba(248,113,113,0.12); color: #f87171; }
  .conv-msg { padding: 0.5rem 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; line-height: 1.5; }
  .conv-msg:last-child { border-bottom: none; }
  .conv-role { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 2px; }
  .conv-role.user { color: var(--accent-en); }
  .conv-role.agent { color: var(--accent-fr); }
  .conv-text { color: var(--text); }
  .h-loading { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.9rem; }
  .h-empty { text-align: center; color: var(--muted); padding: 2rem; font-size: 0.88rem; }
  .history-player-btn {
    display: block; width: 100%; margin-top: 8px;
    font-size: 0.75rem; font-weight: 600;
    background: rgba(79,156,249,0.12); border: 1px solid rgba(79,156,249,0.3);
    color: var(--accent-en); cursor: pointer; padding: 5px 0;
    border-radius: 8px; transition: all 0.15s;
  }
  .history-player-btn:hover { background: rgba(79,156,249,0.22); }
  #history-player-switcher {
    display: flex; gap: 10px; overflow-x: auto; padding: 8px 2px 12px;
    scrollbar-width: none;
  }
  #history-player-switcher::-webkit-scrollbar { display: none; }
  .hps-btn {
    display: flex; flex-direction: column; align-items: center; gap: 5px;
    background: var(--surface); border: 2px solid var(--border);
    border-radius: 16px; padding: 10px 14px; cursor: pointer;
    font-size: 0.8rem; font-weight: 600; color: var(--muted); white-space: nowrap;
    transition: all 0.2s; flex-shrink: 0; min-width: 64px;
  }
  .hps-btn .hps-avatar { font-size: 2rem; line-height: 1; }
  .hps-btn.active { border-color: var(--accent-fr); color: var(--accent-fr); background: rgba(192,132,252,0.12); }
  .hps-btn:hover:not(.active) { border-color: var(--border); background: var(--surface2); color: var(--text); }

  /* ══ SETUP ══ */
  #setup-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding: 1.2rem 1rem 2rem;
    gap: 1.2rem;
  }
  #setup-screen::-webkit-scrollbar { width: 3px; }
  #setup-screen::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .logo { text-align: center; flex-shrink: 0; }
  .logo h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.6rem, 5vw, 3rem);
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, var(--accent-en) 0%, var(--accent-fr) 50%, var(--accent-pt) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .logo p { color: var(--muted); font-size: 0.78rem; margin-top: 0.25rem; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 300; }

  .setup-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 1.25rem; width: 100%; max-width: 560px;
    display: flex; flex-direction: column; gap: 1.1rem; flex-shrink: 0;
  }
  .setup-section label {
    display: block; font-size: 0.68rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.5rem;
  }
  .option-grid { display: grid; gap: 0.45rem; }
  .option-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }

  .opt-btn {
    background: var(--surface2); border: 1.5px solid var(--border); border-radius: 10px;
    padding: 0.55rem 0.4rem; cursor: pointer; text-align: center;
    transition: all 0.15s ease; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500;
  }
  .opt-btn:hover { border-color: var(--accent); background: #1e2535; }
  .opt-btn.selected { border-color: var(--accent); background: rgba(79,156,249,0.12); color: var(--accent); }
  .opt-btn .emoji { display: block; font-size: 1.1rem; margin-bottom: 0.2rem; }
  .opt-btn .sub { display: block; font-size: 0.63rem; color: var(--muted); margin-top: 0.1rem; font-weight: 400; }

  .opt-btn.lang-en.selected { border-color: var(--accent-en); background: rgba(79,156,249,0.1); color: var(--accent-en); }
  .opt-btn.lang-fr.selected { border-color: var(--accent-fr); background: rgba(192,132,252,0.1); color: var(--accent-fr); }
  .opt-btn.lang-pt.selected { border-color: var(--accent-pt); background: rgba(52,211,153,0.1); color: var(--accent-pt); }

  .divider { height: 1px; background: var(--border); margin: 0 -1.25rem; }

  .start-btn {
    width: 100%; padding: 0.9rem; border-radius: 10px; border: none;
    background: var(--accent); color: #0e0f14;
    font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s ease; letter-spacing: 0.02em;
  }
  .start-btn:hover:not(:disabled) { filter: brightness(1.1); transform: translateY(-1px); }
  .start-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* ══ VOICE SCREEN ══ */
  #voice-screen {
    display: none;
    flex-direction: column;
    height: 100vh;
    align-items: center;
  }

  /* Header */
  .voice-header {
    width: 100%;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.7rem 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .vh-left { display: flex; align-items: center; gap: 0.6rem; }
  .vh-flag { font-size: 1.5rem; }
  .vh-title { font-weight: 600; font-size: 0.9rem; }
  .vh-sub { font-size: 0.68rem; color: var(--muted); }
  .reset-btn {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    font-size: 0.72rem; padding: 0.3rem 0.6rem; border-radius: 6px;
    cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s;
  }
  .reset-btn:hover { border-color: var(--text); color: var(--text); }

  /* Center stage */
  .voice-stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 1.5rem 1.5rem 1rem;
    width: 100%;
    overflow: hidden;
  }

  /* Orb — animated speaking indicator */
  .orb-wrap {
    position: relative;
    width: 140px; height: 140px;
    display: flex; align-items: center; justify-content: center;
  }
  .orb-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid var(--accent);
    opacity: 0;
    animation: none;
  }
  .orb-ring-1 { width: 100%; height: 100%; }
  .orb-ring-2 { width: 120%; height: 120%; }
  .orb-ring-3 { width: 140%; height: 140%; }

  .orb {
    width: 90px; height: 90px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #3a8ef0, #1a3a6e);
    border: 2px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 2.2rem;
    position: relative;
    z-index: 1;
    transition: transform 0.2s ease;
    box-shadow: 0 0 30px rgba(79,156,249,0.2);
  }

  /* States */
  .orb-wrap.speaking .orb-ring { animation: pulse-ring 1.5s ease-out infinite; opacity: 1; }
  .orb-wrap.speaking .orb-ring-2 { animation-delay: 0.4s; }
  .orb-wrap.speaking .orb-ring-3 { animation-delay: 0.8s; }
  .orb-wrap.speaking .orb { transform: scale(1.05); box-shadow: 0 0 50px rgba(79,156,249,0.4); }

  .orb-wrap.listening .orb { border-color: #ef4444; box-shadow: 0 0 40px rgba(239,68,68,0.4); background: radial-gradient(circle at 35% 35%, #c0392b, #6e1a1a); }
  .orb-wrap.listening .orb-ring { border-color: #ef4444; animation: pulse-ring 0.8s ease-out infinite; opacity: 1; }
  .orb-wrap.listening .orb-ring-2 { animation-delay: 0.2s; }
  .orb-wrap.listening .orb-ring-3 { animation-delay: 0.4s; }

  .orb-wrap.thinking .orb { border-color: #f59e0b; box-shadow: 0 0 40px rgba(245,158,11,0.3); background: radial-gradient(circle at 35% 35%, #b07d1a, #4a3200); animation: spin-slow 2s linear infinite; }

  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.15); opacity: 0; }
  }
  @keyframes spin-slow {
    from { transform: rotate(0deg); } to { transform: rotate(360deg); }
  }

  /* Status text */
  .status-label {
    font-size: 0.8rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    height: 1.2rem;
    transition: color 0.3s;
  }
  .status-label.speaking { color: var(--accent); }
  .status-label.listening { color: #ef4444; }
  .status-label.thinking { color: #f59e0b; }

  /* Transcript card */
  .transcript-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1rem 1.2rem;
    width: 100%;
    max-width: 480px;
    min-height: 80px;
    max-height: 38vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    flex-shrink: 1;
  }
  .transcript-agent {
    font-size: 0.85rem;
    line-height: 1.6;
    color: var(--text);
    min-height: 1.4rem;
  }
  .transcript-translation {
    font-size: 0.72rem;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 0.5rem;
    font-style: italic;
    line-height: 1.5;
    display: none;
  }
  .transcript-user {
    font-size: 0.8rem;
    color: #8ab4f8;

<script>
// ══ LOGIN ══
document.getElementById('setup-screen').style.display = 'none';


document.getElementById('login-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkLogin();
});
function checkLogin() {
  const val = document.getElementById('login-input').value;
  if (val.trim().toLowerCase().replace(/[^a-z0-9]/g, '') === 'ro85') {
    localStorage.setItem('ttm_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    try { showPlayerScreen(); } catch(e) { location.reload(); }
  } else {
    const err = document.getElementById('login-error');
    err.style.display = 'block';
    document.getElementById('login-input').value = '';
  }
}

// ══ CONFIG ══
const config = { lang: null, level: null };

// ══ PERSISTENCE ══
let currentPlayer = null;

function saveSession() {
  if (!currentPlayer || currentPlayer === 'Invitado') return;
  accumulateTime();
  localStorage.setItem(`lc_config_${currentPlayer}`, JSON.stringify(config));
  localStorage.setItem(`lc_history_${currentPlayer}`, JSON.stringify(conversationHistory));
}

document.addEventListener('visibilitychange', () => { if (document.hidden) accumulateTime(); });

function loadSession(player) {
  try {
    const savedConfig = JSON.parse(localStorage.getItem(`lc_config_${player}`));
    const savedHistory = JSON.parse(localStorage.getItem(`lc_history_${player}`));
    if (savedConfig && savedHistory && savedHistory.length > 0) {
      return { config: savedConfig, history: savedHistory };
    }
  } catch(e) {}
  return null;
}

function clearSession() {
  if (!currentPlayer) return;
  localStorage.removeItem(`lc_config_${currentPlayer}`);
  localStorage.removeItem(`lc_history_${currentPlayer}`);
}

// ══ HISTORY ══
let historyPlayer = null;
let currentHTab = 'analysis';

const HISTORY_PLAYERS = ['Ju','Sari','Ro'];

function renderPlayerSwitcher(activePlayer) {
  const el = document.getElementById('history-player-switcher');
  el.innerHTML = HISTORY_PLAYERS.map(p =>
    `<button class="hps-btn${p === activePlayer ? ' active' : ''}" onclick="openHistory('${p}')">
      <span class="hps-avatar">${getAvatar(p)}</span>${p}
    </button>`
  ).join('');
}

function openHistory(player) {
  const saved = loadSession(player);
  historyPlayer = player;
  currentHTab = 'analysis';
  document.getElementById('history-title').textContent = 'Mi progreso';
  document.getElementById('player-screen').style.display = 'none';
  document.getElementById('history-screen').style.display = 'flex';
  renderPlayerSwitcher(player);
  switchHTab('analysis');

  if (!saved || !saved.history || saved.history.length < 2) {
    document.getElementById('h-loading').innerHTML = '<div class="h-empty">Todavía no hay conversaciones guardadas para ' + player + '.<br>¡Empezá a practicar para ver tu progreso!</div>';
    renderConversation([]);
    return;
  }

  renderConversation(saved.history);
  analyzeHistory(saved.history, saved.config);
}

function closeHistory() {
  document.getElementById('history-screen').style.display = 'none';
  document.getElementById('player-screen').style.display = 'flex';
  historyPlayer = null;
}

function switchHTab(tab) {
  currentHTab = tab;
  document.querySelectorAll('.htab').forEach((b, i) => b.classList.toggle('active', (i === 0 && tab === 'analysis') || (i === 1 && tab === 'conversation')));
  document.getElementById('htab-analysis').classList.toggle('active', tab === 'analysis');
  document.getElementById('htab-conversation').classList.toggle('active', tab === 'conversation');
}

function renderConversation(history) {
  const el = document.getElementById('h-conv-list');
  if (!history.length) { el.innerHTML = '<div class="h-empty">Sin conversaciones aún.</div>'; return; }
  el.innerHTML = history.map(m => {
    const isUser = m.role === 'user';
    const text = (m.content || '').split('---')[0].trim();
    if (!text || text === 'Please begin the conversation now with a warm greeting.') return '';
    return `<div class="conv-msg">
      <div class="conv-role ${isUser ? 'user' : 'agent'}">${isUser ? '🎙 Tú' : '🤖 Tutor'}</div>
      <div class="conv-text">${text}</div>
    </div>`;
  }).join('');
}

async function analyzeHistory(history, cfg) {
  document.getElementById('h-loading').innerHTML = '<div class="h-loading">🧠 Analizando tu sesión con IA…</div>';

  const lang = cfg?.lang || 'en';
  const langNames = { en: 'English', fr: 'Français', pt: 'Português' };
  const langName = langNames[lang] || 'English';

  const transcript = history
    .filter(m => m.content && m.content !== 'Please begin the conversation now with a warm greeting.')
    .map(m => `${m.role === 'user' ? 'ESTUDIANTE' : 'TUTOR'}: ${m.content.split('---')[0].trim()}`)
    .join('\n');

  const systemPrompt = `Sos un experto analizador de sesiones de aprendizaje de idiomas. Se te dará la transcripción de una conversación de práctica en ${langName}.
Analizá en profundidad y respondé ÚNICAMENTE con un JSON válido con esta estructura exacta (sin texto extra, sin markdown):
{
  "summary": "Resumen breve de la sesión en español (2-3 oraciones)",
  "errors": [{"mistake": "el error cometido", "correction": "la forma correcta", "explanation": "por qué en español"}],
  "vocabulary": [{"word": "palabra o frase en ${langName}", "meaning": "significado en español", "example": "ejemplo de uso"}],
  "phrases": [{"phrase": "frase útil en ${langName}", "meaning": "traducción al español"}],
  "strengths": ["fortaleza 1 en español", "fortaleza 2"],
  "improve": ["área a mejorar 1 en español", "área a mejorar 2"]
}
Si no hay errores, vocabulary, etc., devolvé arrays vacíos. Máximo 5 items por array.`;

  try {
    const res = await fetch('/api/analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: systemPrompt,
        messages: [{ role: 'user', content: transcript }]
      })
    });
    const data = await res.json();
    let raw = data?.content?.[0]?.text || '';
    // Strip markdown code blocks if Claude wrapped the JSON
    raw = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/, '').trim();
    // Extract first JSON object in case there's extra text
    const match = raw.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('No JSON found');
    const parsed = JSON.parse(match[0]);
    renderAnalysis(parsed);
  } catch(e) {
    document.getElementById('h-loading').innerHTML = '<div class="h-empty">No se pudo analizar la sesión. Intentá más tarde.<br><small>' + e.message + '</small></div>';
  }
}

function renderAnalysis(d) {
  const el = document.getElementById('htab-analysis');
  el.innerHTML = '';

  // Summary
  if (d.summary) {
    el.innerHTML += `<div class="h-card"><div class="h-card-title">📋 Resumen de la sesión</div><div class="h-summary">${d.summary}</div></div>`;
  }

  // Errors
  if (d.errors?.length) {
    const items = d.errors.map(e => `<div class="h-item">
      <span class="h-mistake">✗ ${e.mistake}</span> → <span class="h-correction">✓ ${e.correction}</span>
      <div class="h-expl">${e.explanation}</div>
    </div>`).join('');
    el.innerHTML += `<div class="h-card"><div class="h-card-title">⚠️ Errores y correcciones</div>${items}</div>`;
  }

  // Vocabulary
  if (d.vocabulary?.length) {
    const items = d.vocabulary.map(v => `<div class="h-item">
      <span class="h-word">${v.word}</span> — <span class="h-meaning">${v.meaning}</span>
      ${v.example ? `<div class="h-expl">Ej: ${v.example}</div>` : ''}
    </div>`).join('');
    el.innerHTML += `<div class="h-card"><div class="h-card-title">📖 Vocabulario aprendido</div>${items}</div>`;
  }

  // Phrases
  if (d.phrases?.length) {
    const items = d.phrases.map(p => `<div class="h-item">
      <span class="h-phrase">"${p.phrase}"</span>
      <div class="h-expl">${p.meaning}</div>
    </div>`).join('');
    el.innerHTML += `<div class="h-card"><div class="h-card-title">💬 Frases útiles</div>${items}</div>`;
  }

  // Strengths & improve
  if (d.strengths?.length || d.improve?.length) {
    const s = (d.strengths || []).map(x => `<span class="h-pill good">✓ ${x}</span>`).join('');
    const i = (d.improve || []).map(x => `<span class="h-pill bad">↗ ${x}</span>`).join('');
    el.innerHTML += `<div class="h-card"><div class="h-card-title">📊 Tu desempeño</div>${s}${i}</div>`;
  }

  if (!el.innerHTML) {
    el.innerHTML = '<div class="h-empty">No se encontraron datos suficientes para analizar.</div>';
  }
}

// ══ CONFIG SCREEN ══

}

function renderConfigActions() {
  const el = document.getElementById('config-actions');

    el.innerHTML = `
      <button class="cfg-action-btn primary" disabled>📚 Ver historial y progreso</button>
      <button class="cfg-action-btn secondary" disabled>🎨 Cambiar avatar</button>
    `;
    return;
  }
  const savedLevel = localStorage.getItem('ttm_level_' + configScreenPlayer) || 'intermediate';
  const levels = [
    { val: 'beginner',     emoji: '🌱', label: 'Principiante' },
    { val: 'intermediate', emoji: '📚', label: 'Intermedio' },
    { val: 'advanced',     emoji: '🔥', label: 'Avanzado' },
  ];
  const levelBtns = levels.map(l => `
    <button class="opt-btn${savedLevel === l.val ? ' selected' : ''}" onclick="cfgSaveLevel('${l.val}')">
      <span class="emoji">${l.emoji}</span>${l.label}
    </button>
  `).join('');
  el.innerHTML = `
    <div class="setup-section" style="width:100%;margin-bottom:0.5rem;">
      <label>Nivel de ${configScreenPlayer}</label>
      <div class="option-grid cols-3">${levelBtns}</div>
    </div>
    <button class="cfg-action-btn primary" onclick="cfgOpenHistory()">📚 Ver historial y progreso</button>
    <button class="cfg-action-btn secondary" onclick="cfgOpenAvatar()">🎨 Cambiar avatar</button>
  `;
}

function cfgSaveLevel(val) {
  if (!configScreenPlayer) return;
  localStorage.setItem('ttm_level_' + configScreenPlayer, val);
  if (currentPlayer === configScreenPlayer) config.level = val;
  renderConfigActions();
}

function cfgOpenHistory() {
  if (!configScreenPlayer) return;
  const p = configScreenPlayer;
  closeConfigScreen();
  openHistory(p);
}

function cfgOpenAvatar() {
  if (!configScreenPlayer) return;
  const p = configScreenPlayer;
  closeConfigScreen();
  openAvatarPicker(p);
}

// ══ AVATAR ══

  '👮','👷','💂','🕵️','👩‍⚕️','👨‍⚕️','👩‍🎓','👨‍🎓','👩‍🎤','👨‍🎤',
  '🦸','🦹','🧙','🧝','🧛','🧟','🐶','🐱','🦊','🐻','🐼','🐨',

];

let avatarPickerPlayer = null;

function getAvatar(player) {
  return localStorage.getItem(`lc_avatar_${player}`) || DEFAULT_AVATARS[player] || '🧑';
}

function openAvatarPicker(player) {
  avatarPickerPlayer = player;
  const current = getAvatar(player);
  const card = document.getElementById('avatar-card-inner');

  const tabsHtml = AVATAR_CATEGORIES.map((cat, i) =>
    `<button class="acat-tab${i === 0 ? ' active' : ''}" data-cat="${i}">${cat.label}</button>`
  ).join('');

  // Build grids using DOM (not innerHTML) so emojis are stored safely
  const cardEl = document.createElement('div');

  const h3 = document.createElement('h3');
  h3.textContent = 'Elegí tu avatar';
  cardEl.appendChild(h3);

  const tabsDiv = document.createElement('div');
  tabsDiv.className = 'acat-tabs';
  AVATAR_CATEGORIES.forEach((cat, i) => {
    const tab = document.createElement('button');
    tab.className = 'acat-tab' + (i === 0 ? ' active' : '');
    tab.textContent = cat.label;
    tab.addEventListener('click', () => switchAvatarCat(i));
    tabsDiv.appendChild(tab);
  });
  cardEl.appendChild(tabsDiv);

  const gridsDiv = document.createElement('div');
  gridsDiv.className = 'avatar-grids';
  AVATAR_CATEGORIES.forEach((cat, i) => {
    const grid = document.createElement('div');
    grid.className = 'avatar-cat-grid' + (i === 0 ? ' active' : '');
    grid.id = `acat-${i}`;
    cat.emojis.forEach(e => {
      const btn = document.createElement('button');
      btn.className = 'avatar-opt' + (e === current ? ' selected' : '');
      btn.textContent = e;
      btn.addEventListener('click', () => selectAvatar(e));
      grid.appendChild(btn);
    });
    gridsDiv.appendChild(grid);
  });
  cardEl.appendChild(gridsDiv);

  const closeBtn = document.createElement('button');
  closeBtn.className = 'avatar-close';
  closeBtn.textContent = 'Cerrar';
  closeBtn.addEventListener('click', closeAvatarPicker);
  cardEl.appendChild(closeBtn);

  card.innerHTML = '';
  card.appendChild(cardEl);

  document.getElementById('avatar-modal').classList.add('open');
}

function switchAvatarCat(idx) {
  document.querySelectorAll('.acat-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.avatar-cat-grid').forEach((g, i) => g.classList.toggle('active', i === idx));
}

function selectAvatar(emoji) {
  if (!avatarPickerPlayer) return;
  localStorage.setItem(`lc_avatar_${avatarPickerPlayer}`, emoji);
  const el = document.getElementById(`avatar-${avatarPickerPlayer}`);
  if (el) el.textContent = emoji;
  closeAvatarPicker();
}

function closeAvatarPicker() {
  document.getElementById('avatar-modal').classList.remove('open');
  avatarPickerPlayer = null;
}

function loadAllAvatars() {
  Object.keys(DEFAULT_AVATARS).forEach(p => {
    const el = document.getElementById(`avatar-${p}`);
    if (el) el.textContent = getAvatar(p);
  });
}

// ══ STATS ══
let sessionStart = null;

function getStats(player) {
  try { return JSON.parse(localStorage.getItem(`lc_stats_${player}`)) || {}; } catch(e) { return {}; }
}

function saveStats(player, stats) {
  if (player === 'Invitado') return;
  localStorage.setItem(`lc_stats_${player}`, JSON.stringify(stats));
}

function updateStreak(player) {
  if (player === 'Invitado') return;
  const stats = getStats(player);
  const today = new Date().toISOString().slice(0, 10);
  if (stats.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  stats.streak = stats.lastDate === yesterday ? (stats.streak || 0) + 1 : 1;
  stats.lastDate = today;
  saveStats(player, stats);
}

function accumulateTime() {
  if (!currentPlayer || currentPlayer === 'Invitado' || !sessionStart) return;
  const elapsed = Math.floor((Date.now() - sessionStart) / 1000);
  if (elapsed < 5) return;
  const stats = getStats(currentPlayer);
  stats.totalSeconds = (stats.totalSeconds || 0) + elapsed;
  saveStats(currentPlayer, stats);
  sessionStart = Date.now();
}

function renderStats(player) {
  const el = document.getElementById(`stats-${player}`);
  if (!el) return;
  if (player === 'Invitado') { el.textContent = ''; return; }
  const stats = getStats(player);
  const mins = Math.floor((stats.totalSeconds || 0) / 60);
  const streak = stats.streak || 0;
  el.textContent = `⏱ ${mins} min  🔥 ${streak} día${streak !== 1 ? 's' : ''}`;
}

function showPlayerScreen() {
  accumulateTime();
  loadAllAvatars();
  ['Ju','Sari','Ro'].forEach(p => {
    const saved = p !== 'Invitado' ? loadSession(p) : null;
    const badge = document.getElementById(`badge-${p}`);
    if (badge) badge.parentElement.classList.toggle('has-history', !!saved);
    renderStats(p);
  });
  document.getElementById('player-screen').style.display = 'flex';
}

function selectPlayer(player) {
  currentPlayer = player;
  config.lang = 'en';
  config.level = localStorage.getItem('ttm_level_' + player) || 'intermediate';
  updateStreak(player);
  document.getElementById('player-screen').style.display = 'none';

  const saved = loadSession(player);
  conversationHistory.length = 0; langConfirmed = false; config.lang = 'en';
  if (saved) {
    if (saved.config) Object.assign(config, saved.config);
    if (saved.history && saved.history.length > 0) conversationHistory.push(...saved.history);
    if (config.lang && config.lang !== 'en') langConfirmed = true;
  }
  unlockTTS();
  startVoiceSession(!!saved);
}


const LANG_META = {
  en: { flag: '🇬🇧', name: 'English',    agentName: 'Alex',    ttsLang: 'en-US', sttLang: 'en-US' },
  fr: { flag: '🇫🇷', name: 'Français',   agentName: 'Camille', ttsLang: 'fr-FR', sttLang: 'fr-FR' },
  pt: { flag: '🇧🇷', name: 'Português',  agentName: 'Lucas',   ttsLang: 'pt-BR', sttLang: 'pt-BR' },
};

const conversationHistory = [];
let langConfirmed = false;
let recognition = null;
let currentUtterance = null;
let isAgentSpeaking = false;

// ══ SETUP BUTTONS ══

}

// ══ START ══
function updateVoiceHeader() {
  const meta = LANG_META[config.lang] || LANG_META['en'];
  document.getElementById('hdr-flag').textContent = meta.flag;
  document.getElementById('hdr-title').textContent = meta.name + ' — ' + meta.agentName;
  const levelLabel = { beginner: '🌱 Principiante', intermediate: '📚 Intermedio', advanced: '🔥 Avanzado' }[config.level] || '';
  document.getElementById('hdr-sub').textContent = levelLabel;
  document.getElementById('orb-emoji').textContent = meta.flag;
  const listenBtn = document.getElementById('listen-btn');
  if (listenBtn) listenBtn.textContent = '▶ Escuchar a ' + meta.agentName;
}

function startVoiceSession(isContinuing = false) {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('voice-screen').style.display = 'flex';

  if (!langConfirmed) {
    document.getElementById('lang-picker').style.display = 'flex';
  } else {
    updateVoiceHeader();
    setupSpeechRecognition();
    kickoffConversation(isContinuing);
  }
}

function pickLanguage(lang) {
  config.lang = lang;
  langConfirmed = true;
  document.getElementById('lang-picker').style.display = 'none';
  updateVoiceHeader();
  setupSpeechRecognition();
  kickoffConversation(false);
}

function resetSession() {
  // Stop everything
  if (currentUtterance) { window.speechSynthesis.cancel(); }
  if (recognition) { try { recognition.abort(); } catch(e){} }
  conversationHistory.length = 0; langConfirmed = false; config.lang = 'en';
  isAgentSpeaking = false;

  document.getElementById('transcript-agent').textContent = '…';
  document.getElementById('transcript-translation').style.display = 'none';
  document.getElementById('transcript-user').textContent = '';
  document.getElementById('error-banner').style.display = 'none';

  document.getElementById('voice-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'none';
  showPlayerScreen();
}

// ══ SYSTEM PROMPT ══
function buildSystemPrompt() {
  const meta = LANG_META[config.lang];

  const levelInstr = {
    beginner:     'Use VERY simple vocabulary and SHORT sentences (max 12 words each). Speak slowly and clearly. Basic topics: greetings, daily life, food, family.',
    intermediate: 'Use everyday vocabulary with moderate complexity. Mix simple and compound sentences. Topics: hobbies, travel, work, culture.',
    advanced:     'Use rich vocabulary, idiomatic expressions, complex sentences. Discuss nuanced topics freely. Challenge the user naturally.'
  }[config.level];

  const paceInstr = 'Keep responses to 2-3 sentences. One clear follow-up question. Natural conversational flow.';
  const registerInstr = 'Use neutral everyday register. Contractions fine. Friendly but not slangy.';

  const translationInstr = config.level !== 'advanced'
    ? `CRITICAL: After your response in ${meta.name}, add exactly "---" on a new line, then a SHORT Spanish summary labeled "ES:". Example:\nHello! How are you today?\n---\nES: Te saluda y pregunta cómo estás.`
    : `Do NOT add Spanish translations. Full immersion only.`;

  const langSection = `LANGUAGE: Always respond in ${meta.name}. Do NOT switch languages.`;

  return `You are a warm and encouraging language conversation tutor. This is a VOICE conversation — the user will speak and you will respond. Your responses will be converted to speech.

CRITICAL FOR VOICE: Write ONLY natural spoken sentences. NO bullet points, NO lists, NO markdown, NO asterisks, NO special characters. Write exactly as you would speak out loud.

${langSection}

LEVEL: ${levelInstr}

PACE: ${paceInstr}

REGISTER: ${registerInstr}

ERROR CORRECTION: Correct ALL grammar and pronunciation mistakes immediately — never let them slide.
- GRAMMAR: As soon as you detect a grammar error, stop and correct it clearly. Say the correct version and briefly explain why. Then continue the conversation.
- PRONUNCIATION (written representation): If the user's transcribed speech suggests a mispronunciation (wrong word, garbled text, nonsensical phrase), gently point it out, then say the correct word or phrase SLOWLY, syllable by syllable, with spaces between syllables so TTS reads it at a deliberate pace. For example: "The correct word is... 'ex - pe - ri - en - ce'... let's try it together: ex - pe - ri - en - ce." Repeat it once more at normal speed after.
- Always correct BEFORE continuing the conversation topic.

ENCOURAGEMENT: Be warm. Brief praise when the user does well.

MEMORY: You have access to the full conversation history from past sessions with this student. Use it actively: remember their name, topics you've discussed, mistakes they've made before, vocabulary they've learned, and their progress. Reference past conversations naturally. Build on what they already know.

${translationInstr}

`Begin with a warm greeting in ${meta.name} and start a simple, engaging conversation immediately.`;
}

// ══ API CALL ══
async function callAgent(userMessage) {
  setOrbState('thinking');
  setStatus('Pensando…', 'thinking');

  // Only push if explicitly passed (kickoff already pushed its message)
  if (userMessage && userMessage !== '__already_pushed__') {
    conversationHistory.push({ role: 'user', content: userMessage });
  }

  try {
    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: buildSystemPrompt(),
        messages: conversationHistory
      })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message);

    const fullText = data.content?.map(b => b.text || '').join('') || '';

    conversationHistory.push({ role: 'assistant', content: fullText });

    // Split main text and translation
    const parts = fullText.split('---');
    const spokenText = parts[0].trim();
    const translationRaw = parts[1]?.trim() || null;
    const translation = translationRaw?.replace(/^ES:\s*/i, '').trim() || null;

    // Show in transcript
    document.getElementById('transcript-agent').textContent = spokenText;
    const transEl = document.getElementById('transcript-translation');
    if (translation) {
      transEl.textContent = '🇪🇸 ' + translation;
      transEl.style.display = 'block';
    } else {
      transEl.style.display = 'none';
    }
    document.getElementById('transcript-user').textContent = '';

    saveSession();
    speakText(spokenText);
  } catch (err) {
    showError('Error: ' + err.message);
    setOrbState('idle');
    setStatus('Error — intenta de nuevo', '');
    enableMic(true);
  }
}

// ══ TTS ══
let pendingSpeakText = null;
let ttsUnlocked = false;

function unlockTTS() {
  ttsUnlocked = true;
}

function onTTSDone() {
  if (!isAgentSpeaking) return;
  isAgentSpeaking = false;
  setOrbState('idle');
  showListenBtn(false);

  // Check if mic is usable
  const micAvailable = !!(window.SpeechRecognition || window.webkitSpeechRecognition);
  if (micAvailable && recognition) {
    setStatus('Tu turno — presiona el micrófono 🎙', '');
    enableMic(true);
    const hint = document.getElementById('mic-hint');
    if (hint) hint.textContent = 'Presiona 🎙 para hablar';
  } else {
    setStatus('Tu turno — escribe tu respuesta', '');
    enableMic(true);
  }
}

async function doSpeak(text) {
  const meta = LANG_META[config.lang];
  if (!meta) { onTTSDone(); return; }
  const cleanText = text.replace(/[*_#`]/g, '').trim();
  if (!cleanText) { onTTSDone(); return; }

  // Stop any currently playing audio
  if (currentUtterance) {
    try { currentUtterance.pause(); currentUtterance.src = ''; } catch(e) {}
    currentUtterance = null;
  }

  try {
    const response = await fetch('/api/tts', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text: cleanText, lang: meta.ttsLang, pace: 'normal' })
    });

    if (!response.ok) throw new Error('TTS error ' + response.status);

    const blob = await response.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentUtterance = audio;

    let done = false;
    const finish = () => {
      if (done) return;
      done = true;
      URL.revokeObjectURL(url);
      onTTSDone();
    };

    audio.addEventListener('ended', finish);
    audio.addEventListener('error', finish);

    await audio.play();

    // Watchdog: poll until audio finishes
    const watchdog = setInterval(() => {
      if (!audio || audio.ended || audio.paused || done) {
        clearInterval(watchdog);
        finish();
      }
    }, 500);

    // Hard timeout
    setTimeout(() => { clearInterval(watchdog); finish(); }, 60000);

  } catch(err) {
    console.error('ElevenLabs TTS error:', err);
    onTTSDone();
  }
}

function speakText(text) {
  pendingSpeakText = text;
  isAgentSpeaking = true;
  setOrbState('speaking');
  enableMic(false);

  if (ttsUnlocked) {
    setStatus('Hablando…', 'speaking');
    showListenBtn(false);
    doSpeak(text);
  } else {
    setStatus('Toca ▶ para escuchar', '');
    showListenBtn(true);
  }
}

function showListenBtn(show) {
  const btn = document.getElementById('listen-btn');
  if (btn) btn.style.display = show ? 'flex' : 'none';
}

// ══ STT ══
const SpeechRecognitionAPI = window.SpeechRecognition || window.webkitSpeechRecognition;
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

function setupSpeechRecognition() {
  if (!SpeechRecognitionAPI) {
    setStatus('Sin soporte de voz — escribe tu respuesta', '');
    enableMic(true);
    enableMic(false);
  }
  // On iOS we create a fresh instance on every tap — nothing to set up here
}

function startListening() {
  if (!SpeechRecognitionAPI) return;

  // Always create a new instance (required on iOS Safari)
  if (recognition) { try { recognition.abort(); } catch(e) {} }
  const meta = LANG_META[config.lang];
  recognition = new SpeechRecognitionAPI();
  recognition.lang = meta.sttLang;
  recognition.continuous = false;
  recognition.interimResults = !isIOS; // iOS doesn't support interimResults reliably
  recognition.maxAlternatives = 1;

  let capturedText = '';

  recognition.onstart = () => {
    setOrbState('listening');
    setStatus('Escuchando…', 'listening');
    document.getElementById('transcript-user').textContent = '…';
  };

  recognition.onresult = (event) => {
    let interim = '';
    let final = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) final += t;
      else interim += t;
    }
    capturedText = final || interim || capturedText;
    document.getElementById('transcript-user').textContent = capturedText || '…';
  };

  recognition.onend = () => {
    const micBtnEl = document.getElementById('mic-btn');
    if (micBtnEl) micBtnEl.classList.remove('active');
    // On iOS, also read from transcript element as fallback
    const elText = document.getElementById('transcript-user').textContent.trim();
    const userText = (capturedText || elText || '').trim();

    if (userText && userText !== '…' && userText.length > 1) {
      callAgent(userText);
    } else {
      setOrbState('idle');
      setStatus('No te escuché — intenta de nuevo', '');
      enableMic(true);
    }
  };

  recognition.onerror = (event) => {
    document.getElementById('mic-btn').classList.remove('active');
    if (event.error === 'no-speech') {
      setOrbState('idle');
      setStatus('No te escuché — intenta de nuevo', '');
      enableMic(true);
    } else if (event.error === 'not-allowed') {
      setOrbState('idle');
      setStatus('Sin micrófono — escribe tu respuesta', '');
      enableMic(true);
      enableMic(false);
    } else {
      setOrbState('idle');
      setStatus('Error de voz — intenta de nuevo', '');
      enableMic(true);
    }
  };

  try {
    recognition.start();
  } catch(e) {
    setOrbState('idle');
    setStatus('Error al iniciar micrófono — intenta de nuevo', '');
    enableMic(true);
  }
}

// Mic button — tap to speak
const micBtn = document.getElementById('mic-btn');
micBtn.addEventListener('click', () => {
  unlockTTS();
  if (isAgentSpeaking) return;

  hideError();
  micBtn.classList.add('active');
  enableMic(false);
  startListening();
});

// ══ KICKOFF ══
async function kickoffConversation(isContinuing = false) {
  sessionStart = Date.now();
  const agentEl = document.getElementById('transcript-agent');
  if (isContinuing) {
    // Show last agent message from history
    const lastAgent = [...conversationHistory].reverse().find(m => m.role === 'assistant');
    if (agentEl) agentEl.textContent = lastAgent ? lastAgent.content.split('---')[0].trim() : '…';
    setOrbState('idle');
    setStatus('Tu turno — presiona el micrófono 🎙', '');
    enableMic(true);
  } else {
    if (agentEl) agentEl.textContent = '…';
    conversationHistory.push({ role: 'user', content: 'Please begin the conversation now with a warm greeting.' });
    await callAgent(null);
  }
}

// ══ LISTEN TAP ══
function onListenTap() {
  unlockTTS();
  showListenBtn(false);
  if (pendingSpeakText) doSpeak(pendingSpeakText);
}

// ══ TEXT FALLBACK ══
function showTextFallback() {} // removed

// ══ UI HELPERS ══
function setOrbState(state) {
  const wrap = document.getElementById('orb-wrap');
  wrap.className = 'orb-wrap ' + (state !== 'idle' ? state : '');
}

function setStatus(text, cls) {
  const el = document.getElementById('status-label');
  el.textContent = text;
  el.className = 'status-label ' + (cls || '');
}

function enableMic(enabled) {
  const btn = document.getElementById('mic-btn');
  btn.disabled = !enabled;
  document.getElementById('mic-hint').textContent = enabled
    ? 'Presiona 🎙 para hablar'
    : (isAgentSpeaking ? 'Espera a que termine…' : '');
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-banner').style.display = 'none';
}

// Skip login if already authenticated (runs after all declarations)
if (localStorage.getItem('ttm_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  showPlayerScreen();
}
